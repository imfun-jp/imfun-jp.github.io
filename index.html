<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I’m fun. 株式会社</title>
    <style>
        body {
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        picture {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        picture img {
            width: 100%;
            max-width: 1080px;
            height: auto;
            display: block;
        }
        .contact-info {
            margin: 40px 0;
            text-align: center;
            letter-spacing: 0.1em;
            line-height: 2;
        }
        .contact-info a {
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid #EBFF00;
            font-size: 1.1rem;
        }
        .footer {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        @media (min-width: 769px) {
            picture img {
                max-width: 900px;
                margin-top: 5vh;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <picture>
            <source srcset="hengban.jpg" media="(min-width: 769px)">
            <img src="竖版.jpg" alt="I’m fun. 株式会社">
        </picture>

        <div class="contact-info">
            <a href="mailto:nofun@live.cn">nofun@live.cn</a><br>
            <span style="font-size: 0.9rem; color: #666;">Osaka, Japan</span>
        </div>

        <div class="footer">
            © 2026 I’m fun. 株式会社 | NOFUN MARKET
        </div>
    </div>

</body>
</html>
