<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I’m fun. 株式会社</title>
    <style>
        body {
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        picture {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        picture img {
            width: 100%;
            max-width: 1080px;
            height: auto;
            display: block;
        }
        .contact-section {
            margin: 40px 0;
            text-align: center;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }
        .contact-item {
            margin-bottom: 15px;
        }
        .contact-item a {
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 2px solid #EBFF00; /* 柠檬黄下划线 */
        }
        .address-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        .footer {
            font-size: 0.7rem;
            color: #ccc;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        @media (min-width: 769px) {
            picture img {
                max-width: 850px; /* 电脑端不让图太大，保持精致感 */
                margin-top: 5vh;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <picture>
            <source srcset="card-d.jpg" media="(min-width: 769px)">
            <img src="card-m.jpg" alt="I’m fun. 株式会社">
        </picture>

        <div class="contact-section">
            <div class="contact-item">
                <a href="mailto:nofun@live.cn">nofun@live.cn</a>
            </div>
            <div class="contact-item">
                <a href="tel:07035422345">Tel: 070-3542-2345</a>
            </div>
            <div class="address-text">
                Osaka, Japan
            </div>
        </div>

        <div class="footer">
            © 2026 I’m fun. 株式会社 | NOFUN MARKET
        </div>
    </div>

</body>
</html>
